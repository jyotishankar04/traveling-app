services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: traveling-app-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres:
    image: postgres:16-alpine
    container_name: traveling-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: traveling-app-db
    ports:
      - "5432:5432"
    volumes:
      - traveling-app-postgres-data:/var/lib/postgresql/data

volumes:
  traveling-app-postgres-data:
